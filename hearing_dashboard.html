<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BridgeSign — Hearing Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink: #1A1B26; --sage: #6B7A5E; --sage-lt: #8A9A74;
      --burg: #6B1E2E; --cream: #F4F2EB; --rose: #B08A80;
      --white: #FFFFFF; --muted: #7A7A7A; --border: rgba(107,122,94,0.15);
      --radius: 16px; --sb: 260px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--cream); color: var(--ink); display: flex; height: 100vh; overflow: hidden; }

    .sidebar { width: var(--sb); background: var(--ink); display: flex; flex-direction: column; padding: 26px 18px; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: var(--white); display: flex; align-items: center; gap: 10px; text-decoration: none; margin-bottom: 38px; }
    .logo-mark { width: 34px; height: 34px; border-radius: 9px; background: var(--burg); display: flex; align-items: center; justify-content: center; }
    .logo-mark svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; }
    .logo em { color: var(--rose); font-style: normal; }
    .sb-section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.25); padding: 0 12px; margin: 18px 0 8px; }
    .nav { display: flex; flex-direction: column; gap: 3px; }
    .nav-link { display: flex; align-items: center; gap: 11px; padding: 10px 14px; border-radius: 11px; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.45); cursor: pointer; transition: all .2s; text-decoration: none; border: none; background: none; width: 100%; font-family: 'Outfit', sans-serif; }
    .nav-link:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
    .nav-link.active { background: var(--burg); color: var(--white); }
    .nav-link svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.8; flex-shrink: 0; }
    .sidebar-foot { margin-top: auto; }
    .user-pill { display: flex; align-items: center; gap: 11px; padding: 12px 14px; border-radius: 11px; background: rgba(255,255,255,0.05); }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--burg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .avatar svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; }
    .u-name { font-size: 13px; font-weight: 600; color: var(--white); }
    .u-role { font-size: 11px; color: rgba(255,255,255,0.35); }

    .main { margin-left: var(--sb); flex: 1; display: flex; height: 100vh; overflow: hidden; }

    .conv-list { width: 320px; flex-shrink: 0; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .conv-header { padding: 22px 22px 16px; border-bottom: 1px solid var(--border); }
    .conv-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; margin-bottom: 14px; }
    .search-box { display: flex; align-items: center; gap: 9px; background: var(--cream); border-radius: 10px; padding: 9px 13px; }
    .search-box svg { width: 15px; height: 15px; fill: none; stroke: var(--muted); stroke-width: 2; flex-shrink: 0; }
    .search-box input { border: none; background: none; font-size: 13px; font-family: 'Outfit', sans-serif; color: var(--ink); outline: none; flex: 1; }
    .conv-items { flex: 1; overflow-y: auto; }
    .conv-item { display: flex; align-items: center; gap: 13px; padding: 14px 20px; cursor: pointer; transition: background .15s; border-bottom: 1px solid rgba(107,122,94,0.07); position: relative; }
    .conv-item:hover { background: rgba(107,30,46,0.04); }
    .conv-item.active { background: rgba(107,30,46,0.07); }
    .conv-item.active::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px; background: var(--burg); border-radius: 0 3px 3px 0; }
    .conv-av { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: rgba(107,122,94,0.12); }
    .conv-av svg { width: 22px; height: 22px; fill: none; stroke: var(--sage); stroke-width: 1.8; }
    .conv-meta { flex: 1; min-width: 0; }
    .conv-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .conv-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-time { font-size: 11px; color: var(--muted); }

    .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--cream); min-width: 0; }
    .chat-header { background: var(--white); padding: 16px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .chat-user { display: flex; align-items: center; gap: 13px; }
    .chat-av { width: 42px; height: 42px; border-radius: 50%; background: rgba(107,122,94,0.12); display: flex; align-items: center; justify-content: center; }
    .chat-av svg { width: 22px; height: 22px; fill: none; stroke: var(--sage); stroke-width: 1.8; }
    .chat-name { font-size: 16px; font-weight: 600; }
    .chat-status { font-size: 12px; color: #4CAF50; margin-top: 2px; }
    .chat-actions { display: flex; gap: 10px; }
    .icon-btn { width: 38px; height: 38px; border-radius: 10px; border: none; cursor: pointer; background: var(--cream); display: flex; align-items: center; justify-content: center; transition: background .2s; text-decoration: none; }
    .icon-btn:hover { background: rgba(107,122,94,0.15); }
    .icon-btn svg { width: 18px; height: 18px; fill: none; stroke: var(--ink); stroke-width: 1.8; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; opacity: 0.45; }
    .empty-state svg { width: 52px; height: 52px; fill: none; stroke: var(--ink); stroke-width: 1.2; }
    .empty-state p { font-size: 15px; font-weight: 600; }

    .msg { display: flex; flex-direction: column; max-width: 68%; }
    .msg.from-me { align-self: flex-end; align-items: flex-end; }
    .msg.from-them { align-self: flex-start; align-items: flex-start; }
    .msg-bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; max-width: 100%; }
    .from-me .msg-bubble { background: var(--burg); color: var(--white); border-bottom-right-radius: 4px; }
    .from-them .msg-bubble { background: var(--white); color: var(--ink); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
    .sign-received { background: rgba(107,122,94,0.1); border: 1.5px dashed rgba(107,122,94,0.4); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .sign-received svg { width: 32px; height: 32px; fill: none; stroke: var(--sage); stroke-width: 1.5; flex-shrink: 0; }
    .sign-label strong { display: block; font-size: 13px; font-weight: 600; }
    .sign-label span { font-size: 12px; color: var(--muted); }
    .msg-meta { font-size: 11px; color: var(--muted); margin-top: 5px; display: flex; align-items: center; gap: 5px; }
    .check-icon { color: var(--burg); }

    .chat-input-area { background: var(--white); border-top: 1px solid var(--border); padding: 16px 24px; flex-shrink: 0; }
    .input-mode-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .imt { display: flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; border: 1.5px solid var(--border); background: var(--cream); color: var(--muted); font-family: 'Outfit', sans-serif; }
    .imt svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }
    .imt:hover { border-color: var(--burg); color: var(--burg); }
    .imt.active { background: var(--burg); border-color: var(--burg); color: var(--white); }
    .input-panel { display: none; }
    .input-panel.visible { display: block; }

    /* Voice panel */
    .voice-view { background: var(--ink); border-radius: 12px; height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .voice-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .voice-placeholder svg { width: 32px; height: 32px; fill: none; stroke: rgba(255,255,255,0.35); stroke-width: 1.5; }
    .voice-placeholder p { font-size: 12px; color: rgba(255,255,255,0.35); }
    .rec-badge { position: absolute; top: 10px; right: 10px; background: var(--burg); color: var(--white); font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 50px; display: none; align-items: center; gap: 5px; }
    .voice-actions { display: flex; gap: 10px; }
    .btn-voice { flex: 1; padding: 11px; border-radius: 12px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; font-family: 'Outfit', sans-serif; transition: all .2s; }
    .btn-voice-go { background: var(--burg); color: var(--white); }
    .btn-voice-go:hover { background: #8a2535; }
    .btn-voice-cancel { background: rgba(107,30,46,0.08); color: var(--burg); }

    /* Text panel */
    .text-row { display: flex; gap: 10px; align-items: flex-end; }
    .msg-textarea { flex: 1; padding: 12px 15px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 14px; font-family: 'Outfit', sans-serif; color: var(--ink); background: var(--cream); resize: none; outline: none; transition: border-color .2s; height: 48px; max-height: 120px; }
    .msg-textarea:focus { border-color: var(--burg); }
    .btn-send { width: 48px; height: 48px; border-radius: 12px; border: none; cursor: pointer; background: var(--burg); color: var(--white); display: flex; align-items: center; justify-content: center; transition: background .2s; flex-shrink: 0; }
    .btn-send:hover { background: #8a2535; }
    .btn-send svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(107,122,94,0.25); border-radius: 10px; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <a href="index.html" class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm7 6c0 3.31-2.69 6-6 6s-6-2.69-6-6H4c0 4.08 2.95 7.44 6.84 7.93L11 20v2h2v-2l.16-.07C17.05 19.44 20 16.08 20 12h-2z"/></svg>
    </div>
    Bridge<em>Sign</em>
  </a>
  <div class="sb-section">Messaging</div>
  <nav class="nav">
    <a class="nav-link active" href="#">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      Messages
    </a>
    <a class="nav-link" href="#" onclick="loadHistory()">
      <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      History
    </a>
  </nav>
  <div class="sb-section">Account</div>
  <nav class="nav">
    <a class="nav-link" href="#">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      Profile
    </a>
    <a class="nav-link" href="login.html" onclick="logout()">
      <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
      Sign Out
    </a>
  </nav>
  <div class="sidebar-foot">
    <div class="user-pill">
      <div class="avatar">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm7 6c0 3.31-2.69 6-6 6s-6-2.69-6-6H4c0 4.08 2.95 7.44 6.84 7.93L11 20v2h2v-2l.16-.07C17.05 19.44 20 16.08 20 12h-2z"/></svg>
      </div>
      <div>
        <div class="u-name" id="user-name">Loading...</div>
        <div class="u-role">Hearing User</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">

  <!-- CONVERSATIONS -->
  <div class="conv-list">
    <div class="conv-header">
      <h2>Messages</h2>
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Search conversations..."/>
      </div>
    </div>
    <div class="conv-items" id="conv-items">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 24px;opacity:0.4;text-align:center;">
        <svg style="width:40px;height:40px;fill:none;stroke:var(--ink);stroke-width:1.5" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        <p style="font-size:13px;font-weight:600">No conversations yet</p>
      </div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area">
    <div class="chat-header">
      <div class="chat-user">
        <div class="chat-av">
          <svg viewBox="0 0 24 24"><path d="M17 8C17 10.76 15.35 13.15 13 14.29V17H11V14.29C8.65 13.15 7 10.76 7 8C7 4.69 9.69 2 13 2C16.31 2 17 4.69 17 8Z"/></svg>
        </div>
        <div>
          <div class="chat-name" id="chat-contact-name">Select a conversation</div>
          <div class="chat-status">Online</div>
        </div>
      </div>
      <div class="chat-actions">
        <a href="login.html" class="icon-btn" onclick="logout()">
          <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        </a>
      </div>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="empty-state" id="empty-state">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        <p>No messages yet</p>
        <span style="font-size:13px;color:var(--muted);text-align:center;max-width:220px">Start by typing or recording a voice message.</span>
      </div>
    </div>

    <!-- INPUT BAR -->
    <div class="chat-input-area">
      <div class="input-mode-tabs">
        <button class="imt active" onclick="setMode('voice', this)">
          <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm7 6c0 3.31-2.69 6-6 6s-6-2.69-6-6H4c0 4.08 2.95 7.44 6.84 7.93L11 20v2h2v-2l.16-.07C17.05 19.44 20 16.08 20 12h-2z"/></svg>
          Voice
        </button>
        <button class="imt" onclick="setMode('text', this)">
          <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          Type
        </button>
      </div>

      <!-- Voice panel -->
      <div class="input-panel visible" id="panel-voice">
        <div class="voice-view">
          <div class="voice-placeholder">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm7 6c0 3.31-2.69 6-6 6s-6-2.69-6-6H4c0 4.08 2.95 7.44 6.84 7.93L11 20v2h2v-2l.16-.07C17.05 19.44 20 16.08 20 12h-2z"/></svg>
            <p id="voice-status">Press Record to start speaking</p>
          </div>
        </div>
        <div class="voice-actions">
          <button class="btn-voice btn-voice-go" id="voice-btn" onclick="toggleVoice()">Record Voice</button>
          <button class="btn-voice btn-voice-cancel" onclick="cancelVoice()">Cancel</button>
        </div>
      </div>

      <!-- Text panel -->
      <div class="input-panel" id="panel-text">
        <div class="text-row">
          <textarea class="msg-textarea" id="text-input" placeholder="Type your message..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="btn-send" onclick="sendTextMsg()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const API = 'http://127.0.0.1:8000';
  const token = localStorage.getItem('bs_token');
  const profile = JSON.parse(localStorage.getItem('bs_profile') || 'null');

  if (!token || !profile || profile.role !== 'hearing') {
    window.location.href = 'login.html';
  }

  document.getElementById('user-name').textContent = profile?.name || 'User';

  let recognition = null, isRecording = false;
  let currentReceiverId = null;

  function logout() { localStorage.clear(); }

  function setMode(mode, btn) {
    document.querySelectorAll('.imt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.input-panel').forEach(p => p.classList.remove('visible'));
    document.getElementById('panel-' + mode).classList.add('visible');
    if (mode !== 'voice') cancelVoice();
  }

  function toggleVoice() {
    const btn = document.getElementById('voice-btn');
    const status = document.getElementById('voice-status');
    if (!isRecording) {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Speech recognition not supported in this browser. Please use Chrome.');
        return;
      }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.lang = 'en-US';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        appendMsg('voice', text, true);
        saveMessage(text, 'voice');
        cancelVoice();
      };
      recognition.onerror = () => { cancelVoice(); };
      recognition.start();
      isRecording = true;
      btn.textContent = 'Stop Recording';
      status.textContent = 'Listening...';
    } else {
      cancelVoice();
    }
  }

  function cancelVoice() {
    if (recognition) { recognition.stop(); recognition = null; }
    isRecording = false;
    const btn = document.getElementById('voice-btn');
    const status = document.getElementById('voice-status');
    if (btn) btn.textContent = 'Record Voice';
    if (status) status.textContent = 'Press Record to start speaking';
  }

  async function sendTextMsg() {
    const ta = document.getElementById('text-input');
    const text = ta.value.trim();
    if (!text) return;
    appendMsg('text', text, true);
    ta.value = '';
    ta.style.height = '48px';
    await saveMessage(text, 'text');
  }

  async function saveMessage(content, type) {
    if (!currentReceiverId) return;
    try {
      await fetch(`${API}/messages`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ receiver_id: currentReceiverId, content, type })
      });
    } catch (e) { console.error('Error saving message:', e); }
  }

  function appendMsg(type, text, fromMe) {
    const container = document.getElementById('chat-messages');
    const emptyState = document.getElementById('empty-state');
    if (emptyState) emptyState.remove();
    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const div = document.createElement('div');
    div.className = 'msg ' + (fromMe ? 'from-me' : 'from-them');
    if (type === 'voice') {
      div.innerHTML = `
        <div class="msg-bubble">
          <span style="font-size:11px;opacity:0.7;display:block;margin-bottom:4px">Voice message</span>
          ${text}
        </div>
        <div class="msg-meta">You · ${now} <span class="check-icon">✓</span></div>`;
    } else if (type === 'sign') {
      div.innerHTML = `
        <div class="sign-received">
          <svg viewBox="0 0 24 24"><path d="M21 6.5c0-1.1-.9-2-2-2h-2V3c0-1.1-.9-2-2-2s-2 .9-2 2v1H9V3c0-1.1-.9-2-2-2S5 1.9 5 3v1.5H3c-1.1 0-2 .9-2 2v15c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6.5z"/></svg>
          <div class="sign-label"><strong>Sign Message</strong><span>"${text}"</span></div>
        </div>
        <div class="msg-meta">${now}</div>`;
    } else {
      div.innerHTML = `
        <div class="msg-bubble">${text}</div>
        <div class="msg-meta">You · ${now} <span class="check-icon">✓</span></div>`;
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  async function loadHistory() {
    try {
      const res = await fetch(`${API}/messages/history`, { headers: { 'Authorization': `Bearer ${token}` } });
      const messages = await res.json();
      const container = document.getElementById('chat-messages');
      const emptyState = document.getElementById('empty-state');
      if (emptyState) emptyState.remove();
      container.innerHTML = '';
      if (!Array.isArray(messages) || !messages.length) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">No history available.</div>';
        return;
      }
      messages.forEach(m => {
        const fromMe = m.sender_id === profile.user_id;
        appendMsg(m.type, m.content, fromMe);
      });
    } catch (e) { console.error('Error loading history:', e); }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTextMsg(); }
  }

  function autoResize(el) {
    el.style.height = '48px';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
</script>
</body>
</html>
